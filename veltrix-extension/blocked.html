<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Veltrix AI - Blocked</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #050810;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #0f172a;
      border: 1px solid #ef4444;
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      text-align: center;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(239,68,68,0.15);
      border: 2px solid #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: #ef4444;
      font-weight: 700;
    }
    h1 { font-size: 28px; color: #ef4444; font-weight: 700; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .url-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #64748b;
      word-break: break-all;
      margin: 20px 0;
      text-align: left;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
    }
    .btn-back { background: #3b82f6; color: white; }
    .badge {
      display: inline-block;
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 20px;
      border: 1px solid rgba(239,68,68,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">X</div>
    <div class="badge">VELTRIX AI - URL BLOCKED</div>
    <h1>Access Blocked</h1>
    <p>This URL has been added to Veltrix AI's block list and has been prevented from loading.</p>
    <div class="url-box" id="blockedUrl">Loading URL...</div>
    <p style="font-size:12px; color:#475569;">This protection was applied by the Veltrix AI Phishing Shield extension.</p>
    <br/>
    <button class="btn btn-back" onclick="history.back()">Go Back to Safety</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url") || "Unknown URL";
    document.getElementById("blockedUrl").textContent = url;
  </script>
</body>
</html>
